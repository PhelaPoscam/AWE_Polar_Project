[tool.black]
line-length = 88
target-version = ["py38", "py39", "py310", "py311"]
include = '\.pyi?$'
extend-exclude = '''
/(
  \.venv
  | \.venv313
  | __pycache__
  | data
  | datasets
  | models
)/
'''

[tool.mypy]
ignore_missing_imports = true
warn_unused_configs = true
exclude = [
    "scripts/replicate_tabnet_stress.py"
]
# check_untyped_defs intentionally disabled — enable after cleaning existing 25 errors.

[tool.pytest.ini_options]
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
norecursedirs = [".venv", "reference", "data", "datasets", "models"]
